name: publish

# npm Trusted Publishing (OIDC) — no stored NPM_TOKEN.
# One-time setup on npmjs.com: package "design-skill" → Settings → Trusted Publisher
# → GitHub Actions → org "lrochetta", repo "design-skill", workflow "publish.yml".
# The FIRST publish of a package must be done manually (npm requires the package to
# exist before a trusted publisher can be declared on it).
#
# IMPORTANT: do NOT pass `registry-url` to actions/setup-node. When set, it writes
# `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into .npmrc; with no token
# that empty auth entry makes npm attempt (failed) token auth and SKIP OIDC — the
# publish then 404s. Leaving it out keeps the default registry (npmjs.org) and lets
# npm >= 11.5.1 auto-detect the GitHub OIDC id-token and publish tokenlessly.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g npm@latest # npm >= 11.5.1 required for OIDC
      - run: |
          node --version
          npm --version
          npm publish --access public
